<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Markdown-It Compatible Rewrite Demo</title>
    <meta
      name="description"
      content="A GitHub Pages demo for the fully compatible markdown-it rewrite with a Pretext-inspired prepare() cache."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="./styles.css">
    <script type="module" src="./assets/demo.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">GitHub Pages Demo</p>
          <h1>markdown-it compatibility, live in the browser.</h1>
          <p class="hero-text">
            This playground runs the local rewrite in-browser, shows rendered HTML,
            and demonstrates the extra <code>prepare()</code> cache layer.
          </p>
        </div>
        <div class="hero-meta">
          <div class="meta-card">
            <span class="meta-label">Package version</span>
            <strong>v__VERSION__</strong>
          </div>
          <div class="meta-card">
            <span class="meta-label">Modes</span>
            <strong>Preview, HTML, Tokens</strong>
          </div>
        </div>
      </header>

      <main class="workspace">
        <section class="panel editor-panel">
          <div class="panel-header">
            <div>
              <p class="panel-kicker">Input</p>
              <h2>Markdown Source</h2>
            </div>
            <button id="reset-sample" class="secondary-button" type="button">
              Reset sample
            </button>
          </div>

          <div class="controls-grid">
            <label class="control">
              <span>Preset</span>
              <select id="preset">
                <option value="default">default</option>
                <option value="commonmark">commonmark</option>
                <option value="zero">zero</option>
              </select>
            </label>

            <label class="toggle">
              <input id="html" type="checkbox">
              <span>Allow HTML</span>
            </label>

            <label class="toggle">
              <input id="linkify" type="checkbox" checked>
              <span>Linkify</span>
            </label>

            <label class="toggle">
              <input id="typographer" type="checkbox" checked>
              <span>Typographer</span>
            </label>

            <label class="toggle">
              <input id="breaks" type="checkbox">
              <span>Hard breaks</span>
            </label>

            <label class="toggle">
              <input id="xhtmlOut" type="checkbox">
              <span>XHTML output</span>
            </label>
          </div>

          <textarea
            id="markdown-input"
            spellcheck="false"
            aria-label="Markdown input"
          ></textarea>
        </section>

        <section class="panel output-panel">
          <div class="panel-header">
            <div>
              <p class="panel-kicker">Output</p>
              <h2>Live Result</h2>
            </div>

            <div class="tablist" role="tablist" aria-label="Output views">
              <button class="tab-button is-active" data-view="preview" type="button">Preview</button>
              <button class="tab-button" data-view="html" type="button">HTML</button>
              <button class="tab-button" data-view="tokens" type="button">Tokens</button>
            </div>
          </div>

          <div class="stats-strip" id="stats-strip"></div>

          <div class="view-stack">
            <article id="preview-view" class="view-card rendered-view" data-view-panel="preview"></article>
            <pre id="html-view" class="view-card code-view is-hidden" data-view-panel="html"></pre>
            <pre id="tokens-view" class="view-card code-view is-hidden" data-view-panel="tokens"></pre>
          </div>

          <div class="footer-actions">
            <button id="copy-html" class="primary-button" type="button">Copy HTML</button>
            <span id="copy-status" class="copy-status" aria-live="polite"></span>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
